version: "3.9"

services:
  # ─── Redis (Queue + Cache) ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: vf_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── FastAPI Backend ──────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vf_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=sqlite:////data/vizardfree.db
      - UPLOAD_DIR=/data/uploads
      - OUTPUT_DIR=/data/outputs
      - MODELS_DIR=/data/models
      - WHISPER_MODEL=large-v3
      - MAX_UPLOAD_SIZE=2147483648  # 2GB
      - CORS_ORIGINS=http://localhost:3000
    volumes:
      - app_data:/data
      - ./backend:/app
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ─── RQ Worker ───────────────────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: vf_worker
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=sqlite:////data/vizardfree.db
      - UPLOAD_DIR=/data/uploads
      - OUTPUT_DIR=/data/outputs
      - MODELS_DIR=/data/models
      - WHISPER_MODEL=large-v3
    volumes:
      - app_data:/data
      - ./backend:/app
    depends_on:
      - redis
      - backend

  # ─── Next.js Frontend ────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8000
    container_name: vf_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy

  # ─── Nginx Reverse Proxy ─────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: vf_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  redis_data:
  app_data:
